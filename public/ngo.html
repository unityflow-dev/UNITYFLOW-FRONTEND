<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UnityFlow — NGO Dashboard</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- DM Mono + Syne -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #070d1a;
    --bg2:       #0d1528;
    --bg3:       #111d35;
    --border:    rgba(56,189,248,0.12);
    --accent:    #38bdf8;
    --accent2:   #0ea5e9;
    --text:      #e2eaf4;
    --muted:     #5a7090;
    --u1:        #22c55e;
    --u2:        #84cc16;
    --u3:        #eab308;
    --u4:        #f97316;
    --u5:        #ef4444;
    --radius:    10px;
    --sidebar:   340px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP NAV ── */
  nav {
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-right: 12px;
  }

  .logo span { color: var(--text); opacity: 0.5; }

  .nav-pill {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--muted);
  }

  .nav-pill:hover { color: var(--text); border-color: var(--border); }
  .nav-pill.active { background: rgba(56,189,248,0.1); border-color: var(--accent); color: var(--accent); }

  .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--u1);
    box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }

  .live-label { font-size: 10px; color: var(--u1); letter-spacing: 0.1em; }

  .refresh-counter {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  .leaflet-container { background: #060c18 !important; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Sector filter toggles */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .sector-pill {
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    user-select: none;
  }

  .sector-pill.active {
    color: var(--bg);
    font-weight: 500;
  }

  .sector-pill[data-sector="Healthcare"].active        { background:#38bdf8; border-color:#38bdf8; }
  .sector-pill[data-sector="Flood Relief"].active      { background:#818cf8; border-color:#818cf8; }
  .sector-pill[data-sector="Food and Hunger"].active   { background:#fb923c; border-color:#fb923c; }
  .sector-pill[data-sector="Education"].active         { background:#34d399; border-color:#34d399; }
  .sector-pill[data-sector="Women Safety"].active      { background:#f472b6; border-color:#f472b6; }

  /* Task list */
  .task-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateX(12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    transition: opacity 0.2s;
  }

  .task-card[data-urgency="1"]::before { background: var(--u1); }
  .task-card[data-urgency="2"]::before { background: var(--u2); }
  .task-card[data-urgency="3"]::before { background: var(--u3); }
  .task-card[data-urgency="4"]::before { background: var(--u4); }
  .task-card[data-urgency="5"]::before { background: var(--u5); }

  .task-card:hover {
    transform: translateX(3px);
    border-color: rgba(56,189,248,0.3);
    box-shadow: 0 0 16px rgba(56,189,248,0.06);
  }

  .task-card.selected {
    border-color: var(--accent);
    background: rgba(56,189,248,0.05);
    transform: translateX(3px);
  }

  .task-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .sector-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 0.05em;
  }

  .sector-icon { font-size: 13px; }

  .urgency-badge {
    font-size: 9px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 8px;
    letter-spacing: 0.08em;
  }

  [data-urgency="1"] .urgency-badge { background: rgba(34,197,94,0.15);  color: var(--u1); }
  [data-urgency="2"] .urgency-badge { background: rgba(132,204,22,0.15); color: var(--u2); }
  [data-urgency="3"] .urgency-badge { background: rgba(234,179,8,0.15);  color: var(--u3); }
  [data-urgency="4"] .urgency-badge { background: rgba(249,115,22,0.15); color: var(--u4); }
  [data-urgency="5"] .urgency-badge { background: rgba(239,68,68,0.15);  color: var(--u5); }

  .task-desc {
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .status-open     .status-dot { background: var(--u5); }
  .status-assigned .status-dot { background: var(--u3); }
  .status-completed .status-dot { background: var(--u1); }

  .find-vol-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    background: rgba(56,189,248,0.1);
    border: 1px solid rgba(56,189,248,0.3);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .find-vol-btn:hover {
    background: rgba(56,189,248,0.2);
    border-color: var(--accent);
  }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.8;
    letter-spacing: 0.04em;
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,8,18,0.75);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 400px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    transform: translateY(30px);
    transition: transform 0.22s ease;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal::-webkit-scrollbar { width: 3px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 14px;
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Match cards */
  .match-cards { display: flex; flex-direction: column; gap: 12px; }

  .match-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    animation: matchIn 0.3s ease both;
    transition: border-color 0.15s;
  }

  .match-card:nth-child(1) { animation-delay: 0.05s; }
  .match-card:nth-child(2) { animation-delay: 0.12s; }
  .match-card:nth-child(3) { animation-delay: 0.19s; }

  @keyframes matchIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .match-card:hover { border-color: rgba(56,189,248,0.3); }

  .match-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), #6366f1);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .match-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .match-meta {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 1px;
  }

  .match-score-wrap {
    margin-left: auto;
    text-align: right;
  }

  .match-score-val {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .match-score-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Score bar */
  .score-bar-track {
    height: 4px;
    background: rgba(56,189,248,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), #22d3ee);
    width: 0%;
    transition: width 0.6s ease;
  }

  .match-reason {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .assign-btn {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 9px;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.25);
    color: var(--accent);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .assign-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .assign-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: none;
    color: var(--muted);
    border-color: var(--border);
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, rgba(56,189,248,0.05) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-line { height: 12px; margin-bottom: 8px; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    top: 66px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg3);
    border: 1px solid rgba(34,197,94,0.4);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--u1);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: toastIn 0.25s ease, toastOut 0.25s ease 2.75s forwards;
    white-space: nowrap;
  }

  @keyframes toastIn  { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-8px); } }

  /* ── MAP CUSTOM STYLES ── */
  .leaflet-popup-content-wrapper {
    background: var(--bg2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }

  .leaflet-popup-tip { background: var(--bg2) !important; }

  .map-popup {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    min-width: 180px;
    padding: 2px;
  }

  .map-popup-sector {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .map-popup-row {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    margin-bottom: 3px;
    font-size: 10px;
  }

  .map-popup-val { color: var(--text); }

  .map-popup-btn {
    margin-top: 10px;
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px;
    background: rgba(56,189,248,0.1);
    border: 1px solid rgba(56,189,248,0.3);
    color: var(--accent);
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }

  .map-popup-btn:hover { background: var(--accent); color: var(--bg); }

  /* Spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-matches {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 24px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="logo">UNITY<span>FLOW</span></span>
  <a class="nav-pill" href="#">CITIZEN</a>
  <a class="nav-pill active" href="#">NGO DASHBOARD</a>
  <a class="nav-pill" href="#">VOLUNTEER</a>
  <div class="nav-right">
    <div class="pulse-dot"></div>
    <span class="live-label">LIVE</span>
    <span class="refresh-counter" id="refresh-timer">next refresh in 10s</span>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Active Tasks</div>
      <div class="filter-row" id="filter-row">
        <div class="sector-pill active" data-sector="all">ALL</div>
        <div class="sector-pill active" data-sector="Healthcare">🏥 HEALTH</div>
        <div class="sector-pill active" data-sector="Flood Relief">🌊 FLOOD</div>
        <div class="sector-pill active" data-sector="Food and Hunger">🍱 FOOD</div>
        <div class="sector-pill active" data-sector="Education">📚 EDU</div>
        <div class="sector-pill active" data-sector="Women Safety">🛡️ WOMEN</div>
      </div>
    </div>
    <div class="task-list" id="task-list">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Find Volunteer</div>
        <div class="modal-subtitle" id="modal-subtitle">Matching by skill · proximity · availability</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script>
const API = 'https://unityflow-backend-71bj.onrender.com';

const SECTOR_ICONS = {
  'Healthcare':     '🏥',
  'Flood Relief':   '🌊',
  'Food and Hunger':'🍱',
  'Education':      '📚',
  'Women Safety':   '🛡️',
};

const SECTOR_COLORS = {
  'Healthcare':     '#38bdf8',
  'Flood Relief':   '#818cf8',
  'Food and Hunger':'#fb923c',
  'Education':      '#34d399',
  'Women Safety':   '#f472b6',
};

const URGENCY_COLORS = ['','#22c55e','#84cc16','#eab308','#f97316','#ef4444'];
const URGENCY_LABELS = ['','LOW','LOW-MED','MED','HIGH','CRITICAL'];

// State
let allTasks = [];
let activeFilters = new Set(['Healthcare','Flood Relief','Food and Hunger','Education','Women Safety']);
let markers = {};
let selectedTaskId = null;
let refreshInterval = null;
let countdown = 10;
let countdownInterval = null;
let map = null;

// ── MAP INIT ──
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'topleft' }).addTo(map);
}

// ── FETCH TASKS ──
async function fetchTasks() {
  try {
    const res = await fetch(`${API}/api/tasks`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    allTasks = Array.isArray(data) ? data : (data.tasks || []);
    renderAll();
  } catch (e) {
    console.error('Failed to fetch tasks:', e);
    // show demo data if backend cold
    if (allTasks.length === 0) renderEmptyState();
  }
}

// ── RENDER ALL ──
function renderAll() {
  const filtered = allTasks.filter(t =>
    activeFilters.has(t.sector)
  );
  renderSidebar(filtered);
  renderMarkers(filtered);
}

// ── SIDEBAR ──
function renderSidebar(tasks) {
  const list = document.getElementById('task-list');

  if (tasks.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        No tasks match current filters.<br/>Waiting for reports...
      </div>`;
    return;
  }

  // Sort by urgency desc
  const sorted = [...tasks].sort((a, b) => (b.urgency || 0) - (a.urgency || 0));

  list.innerHTML = sorted.map(task => {
    const u = task.urgency || 1;
    const sector = task.sector || 'Unknown';
    const icon = SECTOR_ICONS[sector] || '📌';
    const status = task.status || 'open';
    const timeAgo = getTimeAgo(task.createdAt);

    return `
    <div class="task-card status-${status}" 
         data-urgency="${u}" 
         data-id="${task._id}"
         onclick="selectTask('${task._id}')">
      <div class="task-top">
        <div class="sector-badge">
          <span class="sector-icon">${icon}</span>
          <span>${sector.toUpperCase()}</span>
        </div>
        <span class="urgency-badge">${URGENCY_LABELS[u]} ${u}/5</span>
      </div>
      <div class="task-desc">${task.description || 'No description provided.'}</div>
      <div class="task-meta">
        <span><span class="status-dot"></span>${status.toUpperCase()} · ${timeAgo}</span>
        ${status === 'open' ? `<button class="find-vol-btn" onclick="event.stopPropagation(); openModal('${task._id}')">FIND VOL →</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── MAP MARKERS ──
function renderMarkers(tasks) {
  // Remove old markers not in new set
  const newIds = new Set(tasks.map(t => t._id));
  Object.keys(markers).forEach(id => {
    if (!newIds.has(id)) { map.removeLayer(markers[id]); delete markers[id]; }
  });

  tasks.forEach(task => {
    const loc = task.location;
    if (!loc) return;

    let lat, lng;
    if (loc.coordinates) { [lng, lat] = loc.coordinates; }
    else if (loc.lat && loc.lng) { lat = loc.lat; lng = loc.lng; }
    else return;

    const u = task.urgency || 1;
    const status = task.status || 'open';
    const color = status === 'completed' ? '#22c55e'
                : status === 'assigned'  ? '#eab308'
                : URGENCY_COLORS[u];

    const icon = L.divIcon({
      className: '',
      html: `
        <div style="
          width:${14 + u * 2}px;
          height:${14 + u * 2}px;
          border-radius:50%;
          background:${color};
          border:2px solid rgba(255,255,255,0.3);
          box-shadow:0 0 ${u * 4}px ${color}80, 0 0 0 0 ${color}40;
          animation: markerPulse 2s infinite;
          cursor:pointer;
        "></div>
        <style>
          @keyframes markerPulse {
            0%,100% { box-shadow:0 0 ${u*4}px ${color}80, 0 0 0 0 ${color}40; }
            50%      { box-shadow:0 0 ${u*6}px ${color}90, 0 0 ${u*3}px ${color}30; }
          }
        </style>`,
      iconSize: [20 + u * 2, 20 + u * 2],
      iconAnchor: [(10 + u), (10 + u)],
    });

    const popupContent = `
      <div class="map-popup">
        <div class="map-popup-sector">${SECTOR_ICONS[task.sector] || '📌'} ${task.sector || 'Unknown'}</div>
        <div class="map-popup-row"><span>URGENCY</span><span class="map-popup-val" style="color:${color}">${URGENCY_LABELS[u]} ${u}/5</span></div>
        <div class="map-popup-row"><span>STATUS</span><span class="map-popup-val">${(task.status || 'open').toUpperCase()}</span></div>
        <div class="map-popup-row"><span>DESC</span><span class="map-popup-val" style="max-width:120px;word-break:break-word">${(task.description || '').substring(0,60)}${task.description?.length > 60 ? '…' : ''}</span></div>
        ${task.status === 'open' ? `<button class="map-popup-btn" onclick="openModal('${task._id}')">FIND VOLUNTEER →</button>` : ''}
      </div>`;

    if (markers[task._id]) {
      markers[task._id].setIcon(icon);
      markers[task._id].setPopupContent(popupContent);
    } else {
      const m = L.marker([lat, lng], { icon })
        .addTo(map)
        .bindPopup(popupContent, { maxWidth: 220 });
      m.on('click', () => selectTask(task._id));
      markers[task._id] = m;
    }
  });
}

// ── SELECT TASK ──
function selectTask(id) {
  selectedTaskId = id;
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.task-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  // Pan map to marker
  if (markers[id]) {
    map.panTo(markers[id].getLatLng(), { animate: true });
    markers[id].openPopup();
  }
}

// ── MODAL ──
async function openModal(taskId) {
  selectedTaskId = taskId;
  const task = allTasks.find(t => t._id === taskId);
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const title = document.getElementById('modal-title');
  const subtitle = document.getElementById('modal-subtitle');

  if (task) {
    title.textContent = `Find Volunteer — ${task.sector}`;
    subtitle.textContent = `${URGENCY_LABELS[task.urgency || 1]} urgency · Matching by skill · proximity · availability`;
  }

  // Loading state
  body.innerHTML = `<div class="loading-matches"><div class="spinner"></div>Running match algorithm...</div>`;
  overlay.classList.add('open');

  try {
    const res = await fetch(`${API}/api/match/${taskId}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const matches = Array.isArray(data) ? data : (data.matches || data.volunteers || []);
    renderMatches(matches, taskId);
  } catch (e) {
    body.innerHTML = `<div class="loading-matches" style="color:#ef4444">⚠ Could not fetch matches.<br/>Check API connection.</div>`;
  }
}

function renderMatches(matches, taskId) {
  const body = document.getElementById('modal-body');

  if (!matches || matches.length === 0) {
    body.innerHTML = `<div class="loading-matches">No volunteers available for this task.</div>`;
    return;
  }

  body.innerHTML = `<div class="match-cards">${matches.slice(0,3).map((m, i) => {
    const vol = m.volunteer || m;
    const score = m.score || m.matchScore || 0;
    const pct = Math.round(score * 100);
    const name = vol.name || vol.volunteerName || 'Unknown';
    const initials = name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    const dist = m.distance_km ? `${m.distance_km.toFixed(1)} km away` : (m.proximity_km ? `${m.proximity_km.toFixed(1)} km away` : '');
    const reason = m.reason || buildReason(m, name);

    return `
    <div class="match-card">
      <div class="match-top">
        <div class="avatar" style="background:linear-gradient(135deg,${['#0ea5e9','#6366f1','#ec4899'][i]},${['#38bdf8','#818cf8','#f472b6'][i]})">${initials}</div>
        <div>
          <div class="match-name">${name}</div>
          <div class="match-meta">${dist}${vol.sector ? ' · ' + vol.sector : ''}</div>
        </div>
        <div class="match-score-wrap">
          <div class="match-score-val">${pct}%</div>
          <div class="match-score-label">MATCH</div>
        </div>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:0%" data-width="${pct}%"></div>
      </div>
      <div class="match-reason">${reason}</div>
      <button class="assign-btn" onclick="assignVolunteer('${taskId}','${vol._id || vol.volunteerId}','${name}',this)">
        ASSIGN ${name.split(' ')[0].toUpperCase()} →
      </button>
    </div>`;
  }).join('')}</div>`;

  // Animate score bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.width = el.dataset.width;
    });
  });
}

function buildReason(m, name) {
  const parts = [];
  if (m.skill_match >= 1) parts.push('Exact skill match');
  else if (m.skill_match >= 0.5) parts.push('Adjacent skill');
  if (m.proximity_score >= 0.9) parts.push('within 2 km');
  else if (m.distance_km) parts.push(`${m.distance_km.toFixed(1)} km away`);
  if (m.availability === 1) parts.push('available today');
  return parts.length ? parts.join(' · ') : `Skill ${Math.round((m.skill_match||0)*100)}% · Proximity ${Math.round((m.proximity_score||0)*100)}% · Avail ${Math.round((m.availability||0)*100)}%`;
}

// ── ASSIGN ──
async function assignVolunteer(taskId, volId, volName, btn) {
  btn.disabled = true;
  btn.textContent = 'Assigning...';

  try {
    const res = await fetch(`${API}/api/tasks/${taskId}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volunteerId: volId })
    });

    if (!res.ok) throw new Error();

    // Update local state
    const task = allTasks.find(t => t._id === taskId);
    if (task) task.status = 'assigned';

    closeModal();
    showToast(`✓ ${volName} assigned successfully`);
    renderAll();

  } catch (e) {
    btn.disabled = false;
    btn.textContent = `ASSIGN ${volName.split(' ')[0].toUpperCase()} →`;
    showToast('⚠ Assignment failed — try again', true);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Click outside modal to close
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── TOAST ──
function showToast(msg, isError = false) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  if (isError) toast.style.cssText = 'border-color:rgba(239,68,68,0.4);color:#ef4444';
  toast.innerHTML = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

// ── FILTERS ──
document.getElementById('filter-row').addEventListener('click', e => {
  const pill = e.target.closest('.sector-pill');
  if (!pill) return;
  const sector = pill.dataset.sector;

  if (sector === 'all') {
    const allActive = activeFilters.size === 5;
    if (allActive) {
      activeFilters.clear();
      document.querySelectorAll('.sector-pill:not([data-sector="all"])').forEach(p => p.classList.remove('active'));
      pill.classList.remove('active');
    } else {
      activeFilters = new Set(['Healthcare','Flood Relief','Food and Hunger','Education','Women Safety']);
      document.querySelectorAll('.sector-pill').forEach(p => p.classList.add('active'));
    }
  } else {
    if (activeFilters.has(sector)) {
      activeFilters.delete(sector);
      pill.classList.remove('active');
    } else {
      activeFilters.add(sector);
      pill.classList.add('active');
    }
    const allPill = document.querySelector('.sector-pill[data-sector="all"]');
    allPill.classList.toggle('active', activeFilters.size === 5);
  }
  renderAll();
});

// ── EMPTY STATE ──
function renderEmptyState() {
  document.getElementById('task-list').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔌</div>
      Connecting to server...<br/>Auto-retrying every 10s
    </div>`;
}

// ── TIME AGO ──
function getTimeAgo(dateStr) {
  if (!dateStr) return 'just now';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

// ── REFRESH COUNTDOWN ──
function startCountdown() {
  const el = document.getElementById('refresh-timer');
  countdown = 10;
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    countdown--;
    el.textContent = `next refresh in ${countdown}s`;
    if (countdown <= 0) {
      fetchTasks();
      countdown = 10;
    }
  }, 1000);
}

// ── BOOT ──
initMap();
fetchTasks();
startCountdown();
</script>
